name: CI

on:
  push:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        required: true
        default: fast
        type: choice
        options:
          - fast
          - release

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    env:
      BAZEL_CACHE_DIR: /Users/runner/telegram-bazel-cache
      BAZEL_REMOTE_CACHE_URL: ${{ vars.BAZEL_REMOTE_CACHE_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Restore Bazel Disk Cache
        if: env.BAZEL_REMOTE_CACHE_URL == ''
        id: bazel-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BAZEL_CACHE_DIR }}
          key: ${{ runner.os }}-telegram-bazel-${{ hashFiles('.bazelrc', 'BUILD.bazel', 'MODULE.bazel', 'MODULE.bazel.lock', 'WORKSPACE', 'versions.json', 'build-system/**/*.py', 'build-system/**/*.json', 'Telegram/**/BUILD', 'submodules/**/BUILD', 'third-party/**/BUILD', '**/*.bzl') }}
          restore-keys: |
            ${{ runner.os }}-telegram-bazel-

      - name: Populate missing submodule directories from .gitmodules
        run: |
          set -eux
          python3 - <<'PY'
          import configparser
          import pathlib
          import subprocess

          config = configparser.ConfigParser()
          config.read(".gitmodules")

          pinned_commits = {
              "build-system/bazel-rules/apple_support": "7967e453d1f54963935a1ae06808e1c64420bfb1",
              "build-system/bazel-rules/rules_apple": "f6aef7db5b649ffc3b7497ecc83a08ad3ab19559",
              "build-system/bazel-rules/rules_swift": "2b9261134a123ad83f8b1d2dc7fc69ae83fe7172",
              "build-system/bazel-rules/rules_xcodeproj": "79f26ec1315531a8459fe95934440cb3ca3c16df",
              "build-system/bazel-rules/sourcekit-bazel-bsp": "feea27cfc88eccc58af0cfe5674444e945cfb75f",
              "submodules/LottieCpp/lottiecpp": "4a3144b5d527429f7bbd0f07003cb372bf8939ce",
              "submodules/TgVoipWebrtc/tgcalls": "8099768559edb0efd2d1b300090c18141226e9a8",
              "submodules/rlottie/rlottie": "67f103bc8b625f2a4a9e94f1d8c7bd84c5a08d1d",
              "third-party/XcodeGen": "53cb43cb66908a28812d7629d03fed94c9827a24",
              "third-party/dav1d/dav1d": "330e20672e85f9de1678dccd6957845898ef57a1",
              "third-party/libvpx/libvpx": "e7bfd8b6c230a6824e7fd1efa2378a7322986128",
              "third-party/td/td": "e894536b2f46caad93f997448d2daff9431b19dd",
              "third-party/webrtc/webrtc": "dfd6b604d7194a3d41614afa2c8abd8825a657aa",
          }

          for section in config.sections():
              path_value = config[section]["path"].strip()
              url_value = config[section]["url"].strip()

              if url_value.startswith("../"):
                  url_value = "https://github.com/TelegramMessenger/" + url_value[3:]

              path = pathlib.Path(path_value)
              if path.exists():
                  try:
                      has_contents = any(path.iterdir())
                  except NotADirectoryError:
                      has_contents = True
                  if has_contents:
                      print(f"Keeping existing path: {path_value}")
                      continue
                  path.rmdir()

              path.parent.mkdir(parents=True, exist_ok=True)
              subprocess.check_call(["git", "init", path_value])
              subprocess.check_call(["git", "-C", path_value, "remote", "add", "origin", url_value])

              pinned_commit = pinned_commits.get(path_value)
              if pinned_commit is None:
                  subprocess.check_call(["git", "-C", path_value, "fetch", "--depth", "1", "origin", "HEAD"])
              else:
                  subprocess.check_call(["git", "-C", path_value, "fetch", "--depth", "1", "origin", pinned_commit])

              subprocess.check_call(["git", "-C", path_value, "checkout", "FETCH_HEAD"])
          PY

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        shell: bash
        run: |
          set -xo pipefail

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR
          mkdir -p build
          BUILD_LOG="build/build.log"
          : > "$BUILD_LOG"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          BUILD_CONFIGURATION="debug_arm64"
          COLLECT_DSYMS="0"
          BUILD_CACHE_FLAG="--cacheDir=$BAZEL_CACHE_DIR"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ inputs.build_mode }}" = "release" ]; then
            BUILD_CONFIGURATION="release_arm64"
            COLLECT_DSYMS="1"
          fi
          if [ -n "$BAZEL_REMOTE_CACHE_URL" ]; then
            BUILD_CACHE_FLAG="--cacheHost=$BAZEL_REMOTE_CACHE_URL"
          fi
          echo "BUILD_CONFIGURATION=$BUILD_CONFIGURATION" >> $GITHUB_ENV
          echo "COLLECT_DSYMS=$COLLECT_DSYMS" >> $GITHUB_ENV
          echo "BUILD_CACHE_FLAG=$BUILD_CACHE_FLAG" >> $GITHUB_ENV

          build_exit=0
          set +e
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs 2>&1 | tee -a "$BUILD_LOG"
          build_exit=${PIPESTATUS[0]}
          if [ "$build_exit" -eq 0 ]; then
            if [ "$GITHUB_EVENT_NAME" = "push" ]; then
              BASE_SHA="${{ github.event.before }}"
              if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
                CHANGED_PEERINFO_FILES="$(git diff --name-only "$BASE_SHA" HEAD -- submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources)"
                if [ -n "$CHANGED_PEERINFO_FILES" ]; then
                  echo "Running PeerInfoScreen preflight build" | tee -a "$BUILD_LOG"
                  python3 -u build-system/Make/Make.py \
                    "$BUILD_CACHE_FLAG" \
                    --bazelUserRoot="$BAZEL_USER_ROOT" \
                    build \
                    --configurationPath="build-system/appstore-configuration.json" \
                    --codesigningInformationPath=build-system/fake-codesigning \
                    --configuration="$BUILD_CONFIGURATION" \
                    --buildNumber="$BUILD_NUMBER" \
                    --target="submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen:PeerInfoScreen" 2>&1 | tee -a "$BUILD_LOG"
                  build_exit=${PIPESTATUS[0]}
                fi
              fi
            fi
          fi
          if [ "$build_exit" -eq 0 ]; then
            python3 -u build-system/Make/Make.py \
              "$BUILD_CACHE_FLAG" \
              --bazelUserRoot="$BAZEL_USER_ROOT" \
              build \
              --configurationPath="build-system/appstore-configuration.json" \
              --codesigningInformationPath=build-system/fake-codesigning \
              --configuration="$BUILD_CONFIGURATION" \
              --buildNumber="$BUILD_NUMBER" 2>&1 | tee -a "$BUILD_LOG"
            build_exit=${PIPESTATUS[0]}
          fi
          set -e
          if [ "$build_exit" -ne 0 ]; then
            FAILURE_EXCERPT=$(python3 - <<'PY'
          import re
          from pathlib import Path
          
          path = Path("build/build.log")
          if path.exists():
              lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
          else:
              lines = []
          
          patterns = [
              re.compile(r"ERROR:"),
              re.compile(r"error:"),
              re.compile(r"Traceback"),
              re.compile(r"returned non-zero exit status"),
          ]
          
          excerpt = []
          for index, line in enumerate(lines):
              if any(pattern.search(line) for pattern in patterns):
                  start = max(0, index - 5)
                  end = min(len(lines), index + 20)
                  excerpt = lines[start:end]
                  break
          
          if not excerpt:
              excerpt = lines[-40:]
          
          text = "\n".join(excerpt).strip()
          escaped = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(escaped)
          PY
            )
            echo "::error::$FAILURE_EXCERPT"
            {
              echo "## Build failure excerpt"
              python3 - <<'PY'
          import re
          from pathlib import Path
          
          path = Path("build/build.log")
          if path.exists():
              lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
          else:
              lines = []
          
          patterns = [
              re.compile(r"ERROR:"),
              re.compile(r"error:"),
              re.compile(r"Traceback"),
              re.compile(r"returned non-zero exit status"),
          ]
          
          excerpt = []
          for index, line in enumerate(lines):
              if any(pattern.search(line) for pattern in patterns):
                  start = max(0, index - 5)
                  end = min(len(lines), index + 20)
                  excerpt = lines[start:end]
                  break
          
          if not excerpt:
              excerpt = lines[-40:]
          
          for line in excerpt:
              print(line)
          PY
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$build_exit"
          fi

          # collect ipa
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          cp "bazel-bin/Telegram/Telegram.ipa" "$OUTPUT_PATH/Telegram.ipa"

          # collect dsym
          if [ "$COLLECT_DSYMS" = "1" ]; then
            mkdir -p build/DSYMs
            shopt -s nullglob
            for f in bazel-bin/Telegram/*.dSYM; do
              cp -R "$f" build/DSYMs/
            done
            if compgen -G "build/DSYMs/*.dSYM" > /dev/null; then
              zip -r "./$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null
            fi
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /Users/Shared/telegram-ios/build/build.log
          if-no-files-found: warn

      - name: Save Bazel Disk Cache
        if: always() && env.BAZEL_REMOTE_CACHE_URL == ''
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BAZEL_CACHE_DIR }}
          key: ${{ steps.bazel-cache-restore.outputs.cache-primary-key }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          release_name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }}) ${{ env.BUILD_CONFIGURATION }}
          body: |
            An unsigned ${{ env.BUILD_CONFIGURATION }} build of Telegram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          draft: false
          prerelease: false

      - name: Upload Release IPA
        id: upload-release-ipa 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
          asset_name: Telegram.ipa
          asset_content_type: application/zip

      - name: Upload Release DSYM
        if: env.COLLECT_DSYMS == '1'
        id: upload-release-dsym 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
          asset_name: Telegram.DSYMs.zip
          asset_content_type: application/zip
